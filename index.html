<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAN Digital Group</title>

<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Inter,sans-serif;
background:url("https://images.unsplash.com/photo-1639322537228-f710d846310a") no-repeat center center fixed;
background-size:cover;
color:#E2E8F0;
}

.container{
max-width:460px;
margin:auto;
padding:18px;
backdrop-filter:blur(6px);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.logo{
font-weight:600;
font-size:20px;
cursor:pointer;
display:flex;
align-items:center;
gap:8px;
}

.logo img{
width:28px;
}

.level{
background:rgba(30,41,59,0.7);
padding:6px 12px;
border-radius:12px;
font-size:12px;
}

.card{
background:rgba(22,32,51,0.65);
padding:16px;
border-radius:16px;
margin-bottom:14px;
box-shadow:0 4px 20px rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

.section-title{
font-size:13px;
color:#94A3B8;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-bottom:8px;
font-weight:600;
cursor:pointer;
background:rgba(255,255,255,0.05);
color:white;
backdrop-filter:blur(6px);
}

button:hover{
opacity:0.85;
}

.btn-primary{background:#2563EB;}
.btn-success{background:#15803D;}
.btn-warning{background:#C2410C;}
.btn-danger{background:#B91C1C;}
.btn-gray{background:#334155;}
.btn-soft{background:rgba(30,41,59,0.6);}

input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-bottom:8px;
background:rgba(30,41,59,0.7);
color:white;
}

.footer{
text-align:center;
font-size:11px;
color:#CBD5F5;
margin-top:15px;
}

#adminPanel{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
z-index:999;
padding:20px;
overflow:auto;
}

</style>

</head>

<body>

<div id="adminPanel">

<h2>ADMIN PANEL</h2>

<div id="adminInfo"></div>

<input id="adminAdjust" placeholder="Ajustar PAN">

<button onclick="adminAdd()">Agregar PAN</button>

<button onclick="freezeAccount()">Congelar cuenta</button>

<button onclick="closeAdmin()">Cerrar</button>

</div>

<div class="container">

<div class="header">

<div class="logo" onclick="logoTap()">
<img src="https://i.postimg.cc/ncHMqPdY/file-0000000048c8720e897c6596974ca126.png">
PAN Digital Group
</div>

<div class="level">Club Privado</div>

</div>

<!-- WALLET -->

<div class="card">

<div class="section-title">Wallet</div>

<div id="walletText">No conectada</div>

<div id="connectWallet"></div>

</div>

<!-- DASHBOARD -->

<div class="card">

<div class="section-title">Dashboard</div>

<div>Balance TON: <span id="tonBalance">0</span></div>

<div>Balance PAN: <span id="panBalance">0</span></div>

<div>Planes activos: <span id="activePlans">0</span></div>

<br>

<div class="section-title">Estadísticas del Club</div>

<div>Total invertido: <span id="clubInvested">0</span> TON</div>

<div>Total planes: <span id="clubPlans">0</span></div>

<div>Total PAN generado: <span id="clubProfit">0</span></div>

<button class="btn-gray" onclick="togglePlans()">Ver planes activos</button>

<div id="planDetails" style="margin-top:8px;font-size:12px;display:none;"></div>

</div>

<!-- DEPOSITO -->

<div class="card">

<div class="section-title">Depósito</div>

<input type="number" id="depositAmount" placeholder="Monto en TON">

<button class="btn-primary" onclick="deposit()">Depositar</button>

</div>

<!-- PLANES -->

<div class="card">

<div class="section-title">Activar Plan</div>

<input type="number" id="planAmount" placeholder="Monto para el plan">

<button class="btn-success" onclick="activatePlan(1)">Plan 1 - Prueba</button>

<button class="btn-success" onclick="activatePlan(2)">Plan 2 - 30 días</button>

<button class="btn-success" onclick="activatePlan(3)">Plan 3 - 60 días</button>

<button class="btn-success" onclick="activatePlan(4)">Plan 4 - 90 días</button>

<button class="btn-success" onclick="reinvestPlan()">Reinvertir</button>

</div>

<!-- FINANZAS -->

<div class="card">

<div class="section-title">Finanzas</div>

<canvas id="clubChart"></canvas>

<br>

<button class="btn-warning" onclick="claim()">Reclamar PAN</button>

<button class="btn-soft" onclick="stake()">Staking PAN</button>

<button class="btn-danger" onclick="withdraw()">Retirar</button>

<button class="btn-gray" onclick="historyLog()">Historial</button>

</div>

<!-- COMUNIDAD -->

<div class="card">

<div class="section-title">Comunidad</div>

<a href="https://t.me/MANDON1" target="_blank"><button class="btn-primary">Soporte</button></a>

</div>

<div class="footer">

PAN Digital Group © 2026

</div>

</div>

<script>

let tonBalance=0
let panBalance=0
let walletAddress=null
let history=[]
let userPlans=[]

let logoClicks=0

function logoTap(){

logoClicks++

if(logoClicks>=5){

openAdmin()

logoClicks=0

}

}

function openAdmin(){

document.getElementById("adminPanel").style.display="block"

document.getElementById("adminInfo").innerText=
"TON:"+tonBalance+
" PAN:"+panBalance+
" Planes:"+userPlans.length

}

function closeAdmin(){

document.getElementById("adminPanel").style.display="none"

}

function adminAdd(){

let val=parseFloat(document.getElementById("adminAdjust").value)

if(val){

panBalance+=val

updateUI()

}

}

function freezeAccount(){

alert("Cuenta congelada (simulación)")

}

function updateStats(){

let invested=0
let profit=0

userPlans.forEach(p=>{

invested+=p.amount
profit+=p.earned||0

})

document.getElementById("clubInvested").innerText=invested.toFixed(2)

document.getElementById("clubPlans").innerText=userPlans.length

document.getElementById("clubProfit").innerText=profit.toFixed(2)

}

function updateUI(){

document.getElementById("tonBalance").innerText=tonBalance.toFixed(4)

document.getElementById("panBalance").innerText=panBalance.toFixed(4)

document.getElementById("activePlans").innerText=userPlans.length

updateStats()

}

function random(min,max){

return Math.random()*(max-min)+min

}

function getYield(plan){

if(plan===1)return random(0.005,0.012)

if(plan===2)return random(0.008,0.015)

if(plan===3)return random(0.01,0.018)

if(plan===4)return random(0.012,0.022)

}

function processYield(){

let now=Date.now()

userPlans.forEach(plan=>{

let days=Math.floor((now-plan.start)/86400000)

if(days>plan.lastDay){

let profit=plan.amount*getYield(plan.plan)

panBalance+=profit

plan.earned=(plan.earned||0)+profit

plan.lastDay=days

}

})

}

function activatePlan(plan){

let amount=parseFloat(document.getElementById("planAmount").value)

if(!amount)return alert("Monto inválido")

if(tonBalance<amount)return alert("Saldo insuficiente")

let duration=7

if(plan===2)duration=30
if(plan===3)duration=60
if(plan===4)duration=90

tonBalance-=amount

userPlans.push({
plan,
amount,
duration,
start:Date.now(),
lastDay:-1,
earned:0
})

updateUI()

}

function reinvestPlan(){

if(panBalance>=20){

tonBalance+=panBalance

panBalance=0

updateUI()

}

}

function deposit(){

let amount=parseFloat(document.getElementById("depositAmount").value)

if(amount>0){

tonBalance+=amount

history.push("Deposito "+amount)

updateUI()

}

}

function claim(){alert("PAN reclamado")}

function stake(){alert("Staking aplicado")}

function withdraw(){alert("Retiro solicitado")}

function historyLog(){alert(history.join("\n"))}

const ctx=document.getElementById('clubChart')

new Chart(ctx,{

type:'line',

data:{
labels:["Inicio","Crecimiento","Actual"],
datasets:[{
label:"Capital Club",
data:[10,50,120],
borderColor:"#22C55E",
tension:0.4
}]
}

})

updateUI()

</script>

</body>
</html>
