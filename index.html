<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAN Digital Group</title>

<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Inter,sans-serif;
background:url("https://images.unsplash.com/photo-1519608487953-e999c86e7455") center/cover fixed;
color:#E2E8F0;
}

.container{
max-width:460px;
margin:auto;
padding:18px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.logo{
display:flex;
align-items:center;
gap:8px;
font-weight:600;
font-size:20px;
}

.logo img{
width:30px;
}

.level{
background:rgba(30,41,59,0.7);
padding:6px 12px;
border-radius:12px;
font-size:12px;
color:#94A3B8;
}

.card{
background:rgba(22,32,51,0.65);
backdrop-filter:blur(10px);
padding:16px;
border-radius:16px;
margin-bottom:14px;
box-shadow:0 4px 20px rgba(0,0,0,0.5);
}

.section-title{
font-size:13px;
color:#94A3B8;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-bottom:8px;
font-weight:600;
cursor:pointer;
}

button:hover{opacity:0.85;}

.btn-primary{background:#2563EB;color:white;}
.btn-success{background:#15803D;color:white;}
.btn-warning{background:#C2410C;color:white;}
.btn-danger{background:#B91C1C;color:white;}
.btn-gray{background:#334155;color:white;}
.btn-soft{background:#1E293B;color:#E2E8F0;}

input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-bottom:8px;
background:#1E293B;
color:white;
}

.footer{
text-align:center;
font-size:11px;
color:#64748B;
margin-top:15px;
}

canvas{
margin-top:10px;
}

.admin-panel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000e0;
display:none;
padding:20px;
z-index:999;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">
<img src="https://i.postimg.cc/ncHMqPdY/file-0000000048c8720e897c6596974ca126.png">
PAN Digital Group
</div>
<div class="level">Club Privado</div>
</div>

<div class="card">
<div class="section-title">Wallet</div>
<div id="walletText">No conectada</div>
<div id="connectWallet"></div>
</div>

<div class="card">
<div class="section-title">Dashboard</div>

<div>Balance TON: <span id="tonBalance">0</span></div>
<div>Balance PAN: <span id="panBalance">0</span></div>

<div>Rentabilidad: Variable</div>

<div>Planes activos: <span id="activePlans">0</span></div>

<button class="btn-gray" onclick="togglePlans()">Ver planes activos</button>

<div id="planDetails" style="margin-top:8px;font-size:12px;color:#94A3B8;display:none;"></div>

<hr>

<div class="section-title">Estadísticas del Club</div>

<div>Total usuarios: 148</div>
<div>Capital del club: 5,280 TON</div>
<div>Pagos realizados: 1,520 PAN</div>

</div>

<div class="card">

<div class="section-title">Depósito</div>

<input type="number" id="depositAmount" placeholder="Monto en TON">

<button class="btn-primary" onclick="deposit()">Depositar</button>

</div>

<div class="card">

<div class="section-title">Activar Plan</div>

<input type="number" id="planAmount" placeholder="Monto para el plan">

<button class="btn-success" onclick="activatePlan(1)">Plan 1</button>
<button class="btn-success" onclick="activatePlan(2)">Plan 2</button>
<button class="btn-success" onclick="activatePlan(3)">Plan 3</button>
<button class="btn-success" onclick="activatePlan(4)">Plan 4</button>

<button class="btn-success" onclick="reinvestPlan()">Reinvertir</button>

</div>

<div class="card">

<div class="section-title">Finanzas</div>

<button class="btn-warning" onclick="claim()">Reclamar PAN</button>
<button class="btn-soft" onclick="stake()">Staking PAN</button>
<button class="btn-danger" onclick="withdraw()">Retirar</button>
<button class="btn-gray" onclick="historyLog()">Historial</button>

<canvas id="clubChart"></canvas>

</div>

<div class="footer">
PAN Digital Group © 2026
</div>

</div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

let tonBalance=0;
let panBalance=0;
let walletAddress=null;
let history=[];
let userPlans=[];

const TON_RECEIVER="UQC_bn7pmX48L4cwHyR8xykM_PK34zNXQdQ0cgE6FCwGi59J";

const tonConnectUI=new TON_CONNECT_UI.TonConnectUI({
manifestUrl:"https://ton-connect.github.io/demo-dapp-with-react-ui/tonconnect-manifest.json",
buttonRootId:"connectWallet"
});

tonConnectUI.onStatusChange(wallet=>{

if(wallet){

walletAddress=wallet.account.address;

document.getElementById("walletText").innerText=
walletAddress.slice(0,6)+"..."+walletAddress.slice(-4);

}

else{

walletAddress=null;
document.getElementById("walletText").innerText="No conectada";

}

});

window.deposit=async function(){

if(!walletAddress) return alert("Conecta tu wallet");

let amount=parseFloat(document.getElementById("depositAmount").value);

if(!amount || amount<=0) return alert("Monto inválido");

const transaction={
validUntil:Math.floor(Date.now()/1000)+600,
messages:[{
address:TON_RECEIVER,
amount:(amount*1000000000).toString()
}]
};

try{

await tonConnectUI.sendTransaction(transaction);

tonBalance+=amount;

document.getElementById("tonBalance").innerText=tonBalance;

alert("Depósito enviado");

}catch(e){

alert("Transacción cancelada");

}

}

window.activatePlan=function(plan){

let amount=parseFloat(document.getElementById("planAmount").value);

if(tonBalance<amount) return alert("Saldo insuficiente");

tonBalance-=amount;

panBalance+=amount*0.10;

document.getElementById("tonBalance").innerText=tonBalance;
document.getElementById("panBalance").innerText=panBalance;

userPlans.push(plan);

document.getElementById("activePlans").innerText=userPlans.length;

alert("Plan activado");

}

window.reinvestPlan=function(){

if(panBalance<20) return alert("Mínimo 20 PAN");

tonBalance+=panBalance;

panBalance=0;

document.getElementById("tonBalance").innerText=tonBalance;
document.getElementById("panBalance").innerText=panBalance;

}

window.togglePlans=function(){

let el=document.getElementById("planDetails");

el.style.display=el.style.display==="none"?"block":"none";

}

window.claim=function(){alert("PAN disponible "+panBalance)}

window.stake=function(){alert("Staking activado")}

window.withdraw=function(){alert("Retiro solicitado")}

window.historyLog=function(){alert("Historial disponible próximamente")}

const ctx=document.getElementById("clubChart");

new Chart(ctx,{
type:"line",
data:{
labels:["Ene","Feb","Mar","Abr","May","Jun"],
datasets:[{
label:"Crecimiento del Club",
data:[200,600,1200,1800,3200,5280],
borderColor:"#FFD700",
tension:0.4
}]
}
});

});

</script>

</body>
</html>
