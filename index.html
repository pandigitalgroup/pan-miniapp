<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAN Digital Group</title>

<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<!-- LIBRERIA GRAFICOS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Inter,sans-serif;
color:#E2E8F0;
background:
linear-gradient(rgba(2,6,23,0.80),rgba(2,6,23,0.92)),
url("https://images.unsplash.com/photo-1519681393784-d120267933ba");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.container{max-width:460px;margin:auto;padding:18px;}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}

.logo{font-weight:600;font-size:20px;display:flex;align-items:center;gap:8px;}

.logo img{width:28px;height:28px;}

.level{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(8px);
padding:6px 12px;
border-radius:12px;
font-size:12px;
color:#E2E8F0;
border:1px solid rgba(255,255,255,0.1);
}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.08);
padding:16px;
border-radius:16px;
margin-bottom:14px;
box-shadow:0 8px 30px rgba(0,0,0,0.4);
}

.section-title{font-size:13px;color:#CBD5F5;margin-bottom:10px;}

button{
width:100%;
padding:12px;
border-radius:12px;
margin-bottom:8px;
font-weight:600;
cursor:pointer;
transition:0.25s;
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
}

button:hover{transform:translateY(-1px);opacity:0.95;}

.btn-primary{background:rgba(37,99,235,0.35);color:white;}
.btn-success{background:rgba(22,163,74,0.35);color:white;}
.btn-warning{background:rgba(234,88,12,0.35);color:white;}
.btn-danger{background:rgba(220,38,38,0.35);color:white;}
.btn-gray{background:rgba(100,116,139,0.35);color:white;}
.btn-soft{background:rgba(255,255,255,0.08);color:white;}

input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.08);
margin-bottom:8px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(8px);
color:white;
}

.footer{text-align:center;font-size:11px;color:#CBD5F5;margin-top:15px;}

.plan-button{margin-bottom:6px;}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="logo">
<img src="https://i.postimg.cc/ncHMqPdY/file-0000000048c8720e897c6596974ca126.png">
PAN Digital Group
</div>

<div class="level" id="level">Club Privado</div>

</div>

<!-- WALLET -->

<div class="card">
<div class="section-title">Wallet</div>
<div id="walletText">No conectada</div>
<div id="connectWallet"></div>
</div>

<!-- DASHBOARD -->

<div class="card">

<div class="section-title">Dashboard</div>

<div>Balance TON: <span id="tonBalance">0</span></div>
<div>Balance PAN: <span id="panBalance">0</span></div>

<div>Rentabilidad: Variable (según rendimiento interno del club)</div>

<div>Planes activos: <span id="activePlans">0</span></div>

<button class="btn-gray" onclick="togglePlans()">Ver planes activos</button>

<div id="planDetails" style="margin-top:8px;font-size:12px;color:#94A3B8;display:none;"></div>

</div>

<!-- DEPOSITO -->

<div class="card">
<div class="section-title">Depósito</div>
<input type="number" id="depositAmount" placeholder="Monto en TON">
<button class="btn-primary" onclick="deposit()">Depositar</button>
</div>

<!-- PLANES -->

<div class="card">

<div class="section-title">Activar Plan</div>

<input type="number" id="planAmount" placeholder="Monto para el plan en TON/USD">

<button class="btn-success plan-button" onclick="activatePlan(1)">Plan 1 - Prueba</button>
<button class="btn-success plan-button" onclick="activatePlan(2)">Plan 2 - 30 días</button>
<button class="btn-success plan-button" onclick="activatePlan(3)">Plan 3 - 60 días</button>
<button class="btn-success plan-button" onclick="activatePlan(4)">Plan 4 - 90 días</button>

<button class="btn-success" onclick="reinvestPlan()">Reinvertir (+20 PAN min)</button>

</div>

<!-- FINANZAS -->

<div class="card">

<div class="section-title">Finanzas</div>

<canvas id="clubChart" height="120"></canvas>

<button class="btn-warning" onclick="claim()">Reclamar PAN</button>
<button class="btn-soft" onclick="stake()">Staking PAN</button>
<button class="btn-danger" onclick="withdraw()">Retirar</button>
<button class="btn-gray" onclick="historyLog()">Historial</button>

</div>

<!-- COMUNIDAD -->

<div class="card">

<div class="section-title">Comunidad</div>

<a href="https://t.me/MANDON1" target="_blank"><button class="btn-primary">Soporte</button></a>

</div>

<div class="footer">
PAN Digital Group © 2026
</div>

</div>

<script>

/* SCRIPT ORIGINAL SIN CAMBIOS */

let tonBalance = 0;
let panBalance = 0;
let walletAddress = null;
let history = [];
let userPlans = [];

const TON_RECEIVER = "UQC_bn7pmX48L4cwHyR8xykM_PK34zNXQdQ0cgE6FCwGi59J";

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
manifestUrl:'https://yesmanbakery.github.io/yesman-app/tonconnect-manifest.json',
buttonRootId:'connectWallet'
});

/* --- GRAFICO --- */

const ctx = document.getElementById('clubChart');

new Chart(ctx,{
type:'line',
data:{
labels:['Lun','Mar','Mié','Jue','Vie','Sab','Dom'],
datasets:[{
label:'Rendimiento del Club',
data:[3,5,4,6,7,5,8],
borderColor:'#FACC15',
backgroundColor:'rgba(250,204,21,0.25)',
fill:true,
tension:0.4
}]
},
options:{
plugins:{
legend:{labels:{color:'white'}}
},
scales:{
x:{ticks:{color:'white'}},
y:{ticks:{color:'white'}}
}
}
});

</script>

</body>
</html>
