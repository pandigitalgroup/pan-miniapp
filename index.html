<script>
let userAddress = null;
let userBalance = 0;

// ================================
// CARGAR DATOS AL INICIAR
// ================================
window.onload = function () {
    const savedBalance = localStorage.getItem("app_balance");
    if (savedBalance) {
        userBalance = parseFloat(savedBalance);
        updateDashboard();
    }

    checkPlansExpiration();
};

// ================================
// CONECTAR WALLET (NO TOCADO)
// ================================
async function connectWallet() {
    if (!window.tonConnectUI) {
        alert("TonConnect no cargó correctamente.");
        return;
    }

    try {
        const wallet = await window.tonConnectUI.connectWallet();
        userAddress = wallet.account.address;
        document.getElementById("walletAddress").innerText = userAddress;
    } catch (error) {
        console.log(error);
    }
}

// ================================
// DEPOSITO (NO TOCADO)
// ================================
function deposit(amount) {
    if (!amount || amount <= 0) {
        alert("Monto inválido");
        return;
    }

    userBalance += parseFloat(amount);
    localStorage.setItem("app_balance", userBalance);
    updateDashboard();
    alert("Depósito realizado correctamente");
}

// ================================
// ACTUALIZAR DASHBOARD (NO TOCADO)
// ================================
function updateDashboard() {
    document.getElementById("balance").innerText = userBalance.toFixed(2) + " TON";
}

// ================================
// ================================
// 🔹 SISTEMA DE PLANES (NUEVO)
// ================================
// ================================

function getUserPlans() {
    let plans = localStorage.getItem("user_plans");
    return plans ? JSON.parse(plans) : [];
}

function saveUserPlans(plans) {
    localStorage.setItem("user_plans", JSON.stringify(plans));
}

// Activar plan
function activatePlan(planName, amount, durationDays) {

    if (userBalance < amount) {
        alert("Saldo insuficiente");
        return;
    }

    userBalance -= amount;
    localStorage.setItem("app_balance", userBalance);
    updateDashboard();

    let plans = getUserPlans();

    let newPlan = {
        id: Date.now(),
        name: planName,
        amount: amount,
        startDate: new Date().getTime(),
        endDate: new Date().getTime() + (durationDays * 24 * 60 * 60 * 1000),
        status: "active"
    };

    plans.push(newPlan);
    saveUserPlans(plans);

    alert("Plan activado correctamente");
}

// Verificar vencimientos
function checkPlansExpiration() {

    let plans = getUserPlans();
    let now = new Date().getTime();
    let updated = false;

    plans.forEach(plan => {
        if (plan.status === "active" && now >= plan.endDate) {
            plan.status = "finished";
            updated = true;
        }
    });

    if (updated) {
        saveUserPlans(plans);
    }
}

// Obtener planes activos
function getActivePlans() {
    let plans = getUserPlans();
    return plans.filter(plan => plan.status === "active");
}

</script>
