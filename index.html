<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini App</title>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>

<body>

<h2>Dashboard</h2>

<p>Balance: <span id="balance">0</span> TON</p>

<button onclick="connectWallet()">Conectar Wallet</button>
<button onclick="deposit()">Depositar</button>

<hr>

<h3>Activar Planes</h3>

<button onclick="activatePlan('plan1',20,7)">Plan 1 Simulador</button>
<button onclick="activatePlan('plan2',20,30)">Plan 2 - 30 días</button>
<button onclick="activatePlan('plan3',101,60)">Plan 3 - 60 días</button>
<button onclick="activatePlan('plan4',201,90)">Plan 4 - 90 días</button>

<script>

// ==========================
// TON CONNECT (SIN CAMBIOS)
// ==========================

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: "https://yesmanbakery.github.io/yesman-app/tonconnect-manifest.json"
});

let walletConnected = false;

async function connectWallet() {
    await tonConnectUI.connectWallet();
    walletConnected = true;
}

// ==========================
// BALANCE APP (SIN CAMBIOS)
// ==========================

let balance = parseFloat(localStorage.getItem("app_balance")) || 0;
let userPlans = JSON.parse(localStorage.getItem("user_plans")) || [];

function updateBalanceUI() {
    document.getElementById("balance").innerText = balance.toFixed(2);
    localStorage.setItem("app_balance", balance);
}

// ==========================
// DEPÓSITO (SIMULACIÓN REAL FUNCIONANDO)
// ==========================

async function deposit() {

    if (!walletConnected) {
        alert("Wallet no conectada");
        return;
    }

    const amount = prompt("Cantidad a depositar en TON:");

    if (!amount || isNaN(amount)) return;

    const transaction = {
        validUntil: Math.floor(Date.now() / 1000) + 600,
        messages: [
            {
                address: "TNci1VNqs6iZhAopkuBZNWb6mYiTsFTkD2",
                amount: (parseFloat(amount) * 1000000000).toString()
            }
        ]
    };

    await tonConnectUI.sendTransaction(transaction);

    balance += parseFloat(amount);
    updateBalanceUI();
}

// ==========================
// ACTIVAR PLANES MÚLTIPLES
// ==========================

function activatePlan(planId, amount, durationDays) {

    if (balance < amount) {
        alert("Balance insuficiente");
        return;
    }

    balance -= amount;
    updateBalanceUI();

    const newPlan = {
        id: planId,
        amount: amount,
        startDate: Date.now(),
        duration: durationDays,
        active: true
    };

    userPlans.push(newPlan);
    localStorage.setItem("user_plans", JSON.stringify(userPlans));

    alert("Plan activado correctamente");
}

// ==========================
// VERIFICAR CICLOS AUTOMÁTICOS
// ==========================

function checkPlansStatus() {

    const now = Date.now();
    let updated = false;

    userPlans.forEach(plan => {

        if (plan.active) {

            const endTime = plan.startDate + (plan.duration * 24 * 60 * 60 * 1000);

            if (now >= endTime) {
                plan.active = false;

                const profit = plan.amount * 0.10; // simulación ganancia

                balance += plan.amount + profit;
                updated = true;
            }
        }
    });

    if (updated) {
        localStorage.setItem("user_plans", JSON.stringify(userPlans));
        updateBalanceUI();
    }
}

setInterval(checkPlansStatus, 10000);

// ==========================
// INICIALIZAR
// ==========================

updateBalanceUI();
checkPlansStatus();

</script>

</body>
</html>
