<script>
// ===============================
// ESTADO GLOBAL (NO SE TOCA NADA MÁS)
// ===============================
let userBalance = 0;
let userPlans = []; // NUEVO: almacena todos los planes activos
let walletConnected = false;

// ===============================
// FUNCIÓN CONECTAR WALLET (IGUAL)
// ===============================
async function connectWallet() {
    try {
        if (!window.tonConnectUI) {
            alert("TonConnect no cargado");
            return;
        }

        const connectedWallet = await window.tonConnectUI.connectWallet();

        if (connectedWallet) {
            walletConnected = true;
            document.getElementById("walletStatus").innerText = "Wallet conectada ✅";
        }

    } catch (error) {
        console.log(error);
    }
}

// ===============================
// DEPÓSITO (NO SE MODIFICA LÓGICA)
// ===============================
function deposit(amount) {
    if (!walletConnected) {
        alert("Wallet no conectada");
        return;
    }

    userBalance += amount;
    updateDashboard();
}

// ===============================
// NUEVA FUNCIÓN AGREGAR PLAN
// ===============================
function addPlan(planName, amount, duration) {

    if (userBalance < amount) {
        alert("Saldo insuficiente");
        return;
    }

    userBalance -= amount;

    const newPlan = {
        id: Date.now(),
        name: planName,
        amount: amount,
        duration: duration,
        start: new Date(),
        active: true
    };

    userPlans.push(newPlan);

    updateDashboard();
}

// ===============================
// OBTENER PLANES ACTIVOS
// ===============================
function getActivePlans() {
    return userPlans.filter(plan => plan.active);
}

// ===============================
// ACTIVADORES DE PLANES
// ===============================
function activatePlan1() {
    addPlan("Plan Simulador", 20, 30);
}

function activatePlan2(amount) {
    if (amount < 20 || amount > 100) {
        alert("Monto inválido para Plan 2");
        return;
    }
    addPlan("Plan 30 días", amount, 30);
}

function activatePlan3(amount) {
    if (amount < 101 || amount > 200) {
        alert("Monto inválido para Plan 3");
        return;
    }
    addPlan("Plan 60 días", amount, 60);
}

function activatePlan4(amount) {
    if (amount < 201 || amount > 10000) {
        alert("Monto inválido para Plan 4");
        return;
    }
    addPlan("Plan VIP", amount, 90);
}

// ===============================
// REINVERTIR
// ===============================
function reinvest(amount) {
    if (amount < 20) {
        alert("Mínimo reinversión 20");
        return;
    }

    if (userBalance < amount) {
        alert("Saldo insuficiente");
        return;
    }

    addPlan("Reinversión", amount, 30);
}

// ===============================
// DASHBOARD (NO SE MODIFICA DISEÑO)
// ===============================
function updateDashboard() {

    document.getElementById("balance").innerText = userBalance + " TON";

    const activePlans = getActivePlans();

    document.getElementById("activePlansCount").innerText = activePlans.length;

}
</script>
