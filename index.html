<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prueba Wallet TON</title>
<script src="https://unpkg.com/@tonconnect/ui@0.4.0/dist/tonconnect-ui.min.js"></script>
</head>
<body>
<h2>Conectar Wallet TON</h2>
<div id="walletText">Wallet no conectada</div>
<button id="connectWalletBtn">Conectar Wallet</button>

<script>
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://yesmanbakery.github.io/yesman-app/tonconnect-manifest.json'
});

let walletAddress = null;

document.getElementById("connectWalletBtn").addEventListener("click", async () => {
    try {
        const wallet = await tonConnectUI.connect();
        if(wallet && wallet.account) {
            walletAddress = wallet.account.address;
            document.getElementById("walletText").innerText = "Wallet conectada: " + walletAddress;
            alert("Wallet conectada: " + walletAddress);
        } else {
            alert("No se pudo obtener la wallet");
        }
    } catch(e) {
        alert("Error al conectar la wallet: " + e);
    }
});
</script>
</body>
</html>
