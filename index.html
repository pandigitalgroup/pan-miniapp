<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAN Digital Group</title>

<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Inter,sans-serif;
background:linear-gradient(135deg,#020617,#0F172A,#1E293B);
color:#E2E8F0;
}

.container{
max-width:460px;
margin:auto;
padding:18px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.logo{
display:flex;
align-items:center;
gap:8px;
font-weight:600;
font-size:20px;
cursor:pointer;
}

.logo img{
width:26px;
}

.level{
background:rgba(30,41,59,0.6);
padding:6px 12px;
border-radius:12px;
font-size:12px;
color:#94A3B8;
backdrop-filter:blur(6px);
}

.card{
background:rgba(22,32,51,0.55);
padding:16px;
border-radius:16px;
margin-bottom:14px;
box-shadow:0 4px 20px rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

.section-title{
font-size:13px;
color:#94A3B8;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-bottom:8px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{opacity:0.85;}

.btn-primary{background:#2563EB;color:white;}
.btn-success{background:#15803D;color:white;}
.btn-warning{background:#C2410C;color:white;}
.btn-danger{background:#B91C1C;color:white;}
.btn-gray{background:#334155;color:white;}
.btn-soft{background:#1E293B;color:#E2E8F0;}

input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-bottom:8px;
background:#1E293B;
color:white;
}

.footer{
text-align:center;
font-size:11px;
color:#64748B;
margin-top:15px;
}

/* ADMIN PANEL */

#adminPanel{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
z-index:999;
padding:20px;
overflow:auto;
}

</style>
</head>

<body>

<!-- ADMIN PANEL -->

<div id="adminPanel">

<h2>Panel Admin</h2>

<div id="adminInfo"></div>

<input id="adminAddPan" placeholder="Agregar PAN">

<button onclick="adminAdd()">Agregar PAN</button>

<button onclick="freeze()">Congelar cuenta</button>

<button onclick="closeAdmin()">Cerrar</button>

</div>


<div class="container">

<div class="header">

<div class="logo" onclick="logoTap()">

<img src="https://i.postimg.cc/ncHMqPdY/file-0000000048c8720e897c6596974ca126.png">

PAN Digital Group

</div>

<div class="level" id="level">Club Privado</div>

</div>


<!-- WALLET -->

<div class="card">
<div class="section-title">Wallet</div>
<div id="walletText">No conectada</div>
<div id="connectWallet"></div>
</div>


<!-- DASHBOARD -->

<div class="card">

<div class="section-title">Dashboard</div>

<div>Balance TON: <span id="tonBalance">0</span></div>
<div>Balance PAN: <span id="panBalance">0</span></div>

<div>Planes activos: <span id="activePlans">0</span></div>

<br>

<div class="section-title">Estadísticas del Club</div>

<div>Total invertido: <span id="clubInvest">0</span> TON</div>
<div>Total PAN generado: <span id="clubPan">0</span></div>

<button class="btn-gray" onclick="togglePlans()">Ver planes activos</button>

<div id="planDetails" style="margin-top:8px;font-size:12px;color:#94A3B8;display:none;"></div>

</div>


<!-- DEPOSITO -->

<div class="card">
<div class="section-title">Depósito</div>
<input type="number" id="depositAmount" placeholder="Monto en TON">
<button class="btn-primary" onclick="deposit()">Depositar</button>
</div>


<!-- PLANES -->

<div class="card">
<div class="section-title">Activar Plan</div>
<input type="number" id="planAmount" placeholder="Monto para el plan en TON/USD">
<button class="btn-success" onclick="activatePlan(1)">Plan 1 - Prueba</button>
<button class="btn-success" onclick="activatePlan(2)">Plan 2 - 30 días</button>
<button class="btn-success" onclick="activatePlan(3)">Plan 3 - 60 días</button>
<button class="btn-success" onclick="activatePlan(4)">Plan 4 - 90 días</button>
<button class="btn-success" onclick="reinvestPlan()">Reinvertir</button>
</div>


<!-- FINANZAS -->

<div class="card">

<div class="section-title">Finanzas</div>

<canvas id="clubChart"></canvas>

<br>

<button class="btn-warning" onclick="claim()">Reclamar PAN</button>
<button class="btn-soft" onclick="stake()">Staking PAN</button>
<button class="btn-danger" onclick="withdraw()">Retirar</button>
<button class="btn-gray" onclick="historyLog()">Historial</button>

</div>


<!-- COMUNIDAD -->

<div class="card">

<div class="section-title">Comunidad</div>

<a href="https://t.me/MANDON1" target="_blank"><button class="btn-primary">Soporte</button></a>

</div>


<div class="footer">
PAN Digital Group © 2026
</div>

</div>


<script>

let tonBalance=0;
let panBalance=0;
let walletAddress=null;
let history=[];
let userPlans=[];

let logoClicks=0;

/* ADMIN */

function logoTap(){

logoClicks++;

if(logoClicks>=5){

openAdmin();

logoClicks=0;

}

}

function openAdmin(){

document.getElementById("adminPanel").style.display="block";

document.getElementById("adminInfo").innerText=
"TON:"+tonBalance+" PAN:"+panBalance+" Planes:"+userPlans.length;

}

function closeAdmin(){

document.getElementById("adminPanel").style.display="none";

}

function adminAdd(){

let val=parseFloat(document.getElementById("adminAddPan").value);

if(val){

panBalance+=val;

updateUI();

}

}

function freeze(){

alert("Cuenta congelada (simulación)");

}


/* STATS */

function updateStats(){

let invest=0;
let pan=0;

userPlans.forEach(p=>{

invest+=p.amount;
pan+=p.earned||0;

});

document.getElementById("clubInvest").innerText=invest.toFixed(2);
document.getElementById("clubPan").innerText=pan.toFixed(2);

}


/* UI */

function updateUI(){

document.getElementById("tonBalance").innerText=tonBalance.toFixed(4);
document.getElementById("panBalance").innerText=panBalance.toFixed(4);
document.getElementById("activePlans").innerText=userPlans.length;

updateStats();

updateChart();

}


/* GRAPH */

let chart;

function updateChart(){

let invested=userPlans.reduce((a,b)=>a+b.amount,0);

let profit=userPlans.reduce((a,b)=>a+(b.earned||0),0);

if(!chart){

chart=new Chart(document.getElementById("clubChart"),{

type:"line",

data:{
labels:["Capital","Ganancias"],
datasets:[{
label:"Club",
data:[invested,profit],
borderColor:"#22C55E",
tension:0.4
}]
}

});

}else{

chart.data.datasets[0].data=[invested,profit];
chart.update();

}

}

</script>

</body>
</html>
