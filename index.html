<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAN Digital Group</title>

<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<style>

/* ===== FONDO EXCLUSIVO ===== */
body{
margin:0;
font-family:Inter,sans-serif;
background:
radial-gradient(circle at 20% 30%, rgba(0,212,255,0.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,215,0,0.15), transparent 40%),
linear-gradient(135deg,#0F172A,#111827,#1E293B);
color:#E2E8F0;
}

.container{max-width:460px;margin:auto;padding:18px;}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:600;
font-size:20px;
}

/* ===== LOGO ===== */
.logo img{
height:40px;
width:auto;
border-radius:8px;
box-shadow:0 0 15px rgba(255,215,0,0.4);
}

.level{
background:#1E293B;
padding:6px 12px;
border-radius:12px;
font-size:12px;
color:#FFD700;
font-weight:600;
}

.card{
background:rgba(22,32,51,0.85);
backdrop-filter:blur(12px);
padding:16px;
border-radius:16px;
margin-bottom:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
border:1px solid rgba(255,215,0,0.1);
}

.section-title{font-size:13px;color:#94A3B8;margin-bottom:10px;}
button{width:100%;padding:12px;border:none;border-radius:12px;margin-bottom:8px;font-weight:600;cursor:pointer;}
button:hover{opacity:0.85;}
.btn-primary{background:#2563EB;color:white;}
.btn-success{background:#15803D;color:white;}
.btn-warning{background:#C2410C;color:white;}
.btn-danger{background:#B91C1C;color:white;}
.btn-gray{background:#334155;color:white;}
.btn-soft{background:#1E293B;color:#E2E8F0;}

input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-bottom:8px;
background:#1E293B;
color:white;
}

.footer{text-align:center;font-size:11px;color:#64748B;margin-top:15px;}

</style>
</head>

<body>
<div class="container">

<div class="header">
<div class="logo">
<img src="https://i.postimg.cc/ncHMqPdY/file-0000000048c8720e897c6596974ca126.png">
PAN Digital Group
</div>
<div class="level">Club Privado</div>
</div>

<!-- WALLET -->
<div class="card">
<div class="section-title">Wallet</div>
<div id="walletText">No conectada</div>
<div id="connectWallet"></div>

<!-- LINK REFERIDO SIEMPRE VISIBLE -->
<div style="margin-top:8px;font-size:12px;color:#FFD700;">
Tu link de referido:
<input type="text"
value="https://TU_DOMINIO.com/?ref=pan23hgr1"
readonly>
</div>

</div>

<!-- DEPOSITO -->
<div class="card">
<div class="section-title">Depósito</div>
<input type="number" id="depositAmount" placeholder="Monto en TON">
<button class="btn-primary" onclick="deposit()">Depositar</button>
</div>

<div class="footer">
PAN Digital Group © 2026
</div>

</div>

<script>

let walletAddress = null;

const TON_RECEIVER = "TU_WALLET_TON_AQUI";

/* ===== TONCONNECT CON MANIFEST ===== */
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
manifestUrl:'https://TU_DOMINIO.com/tonconnect-manifest.json',
buttonRootId:'connectWallet'
});

tonConnectUI.onStatusChange(wallet=>{
if(wallet && wallet.account){
walletAddress = wallet.account.address;
document.getElementById("walletText").innerText =
walletAddress.slice(0,6)+"...";
}else{
walletAddress=null;
document.getElementById("walletText").innerText="No conectada";
}
});

/* ===== DEPOSITO ===== */
async function deposit(){

if(!walletAddress){
alert("Conecta tu wallet primero");
return;
}

let amount=parseFloat(document.getElementById("depositAmount").value);
if(!amount || amount<=0){
alert("Monto inválido");
return;
}

try{

const transaction={
validUntil:Math.floor(Date.now()/1000)+600,
messages:[{
address:TON_RECEIVER,
amount:(amount*1000000000).toString()
}]
};

await tonConnectUI.sendTransaction(transaction);

alert("Depósito enviado correctamente");

}catch(e){
alert("Transacción cancelada o fallida");
}

}

</script>
</body>
</html>
