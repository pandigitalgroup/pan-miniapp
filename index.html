<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
  color: #1e293b;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  margin-bottom: 20px;
}

h1 {
  text-align: center;
  font-weight: 600;
  margin-bottom: 10px;
}

.price {
  font-size: 28px;
  font-weight: bold;
  text-align: center;
  margin-top: 5px;
}

.buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

button {
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s;
}

.btn-active {
  background: #2563eb;
  color: white;
}

.btn-inactive {
  background: #e2e8f0;
  color: #1e293b;
}

button:hover {
  opacity: 0.85;
}

.footer {
  text-align: center;
  font-size: 14px;
  margin-top: 20px;
  color: #64748b;
}
</style>
</head>

<body>

<div class="container">

  <h1>Gráfico TON</h1>

  <div class="card">
    <div style="text-align:center;">Precio actual TON (USD)</div>
    <div class="price" id="currentPrice">Cargando...</div>
  </div>

  <div class="card">
    <div class="buttons">
      <button id="btn7" class="btn-active">7 Días</button>
      <button id="btn30" class="btn-inactive">30 Días</button>
    </div>

    <canvas id="tonChart"></canvas>
  </div>

  <div class="footer">
    Datos en tiempo real vía CoinGecko API
  </div>

</div>

<script>

let chart;
let currentDays = 7;

async function fetchCurrentPrice() {
  const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=toncoin&vs_currencies=usd");
  const data = await res.json();
  document.getElementById("currentPrice").innerText = "$" + data.toncoin.usd;
}

async function loadChart(days) {

  const response = await fetch(
    `https://api.coingecko.com/api/v3/coins/toncoin/market_chart?vs_currency=usd&days=${days}`
  );

  const data = await response.json();

  const prices = data.prices.map(item => ({
    x: new Date(item[0]),
    y: item[1]
  }));

  if(chart) chart.destroy();

  const ctx = document.getElementById("tonChart").getContext("2d");

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        label: 'TON USD',
        data: prices,
        borderColor: '#2563eb',
        backgroundColor: 'rgba(37,99,235,0.1)',
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        x: {
          type: 'time',
          time: {
            unit: days === 7 ? 'day' : 'day'
          }
        },
        y: {
          beginAtZero: false
        }
      }
    }
  });
}

document.getElementById("btn7").addEventListener("click", () => {
  currentDays = 7;
  loadChart(7);
  setActiveButton(7);
});

document.getElementById("btn30").addEventListener("click", () => {
  currentDays = 30;
  loadChart(30);
  setActiveButton(30);
});

function setActiveButton(days) {
  document.getElementById("btn7").className = days === 7 ? "btn-active" : "btn-inactive";
  document.getElementById("btn30").className = days === 30 ? "btn-active" : "btn-inactive";
}

fetchCurrentPrice();
loadChart(7);

setInterval(fetchCurrentPrice, 60000);

</script>

</body>
</html>
